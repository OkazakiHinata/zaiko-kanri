<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教材在庫管理 - 加藤ゼミナール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ログイン画面 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <h2 class="login-title">加藤ゼミナール</h2>
      <p class="login-subtitle">教材在庫管理システム</p>
      <form id="loginForm">
        <div class="login-field">
          <label for="loginId">ログインID</label>
          <input type="text" id="loginId" placeholder="メールアドレスを入力" required>
        </div>
        <div class="login-field">
          <label for="loginPassword">パスワード</label>
          <input type="password" id="loginPassword" placeholder="パスワードを入力" required>
        </div>
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="login-btn">ログイン</button>
      </form>
    </div>
  </div>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">加藤ゼミナール <span class="logo-sub">教材在庫管理</span></h1>
      <div class="header-right">
        <span class="header-user">管理者</span>
        <button class="logout-btn" id="logoutBtn">ログアウト</button>
      </div>
    </div>
  </header>

  <div class="layout">
    <!-- サイドバー -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a class="sidebar-link active" data-page="dashboard">ダッシュボード</a>
        <a class="sidebar-link" data-page="inventory">在庫一覧</a>
        <a class="sidebar-link" data-page="alerts">発注アラート</a>
        <a class="sidebar-link" data-page="history">入出庫履歴</a>
      </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main">

      <!-- ========== ダッシュボード ========== -->
      <div class="page" id="page-dashboard">
        <h2 class="page-title">ダッシュボード</h2>
        <section class="summary-cards" id="summaryCards"></section>
        <section class="alert-section" id="alertSection"></section>
        <section class="table-section">
          <div class="section-header">
            <h3 class="section-title">在庫状況（概要）</h3>
          </div>
          <div class="table-wrap">
            <table class="inventory-table">
              <thead>
                <tr>
                  <th>教材名</th>
                  <th>科目</th>
                  <th>在庫数</th>
                  <th>最低在庫</th>
                  <th>状態</th>
                </tr>
              </thead>
              <tbody id="dashboardTableBody"></tbody>
            </table>
          </div>
        </section>
      </div>

      <!-- ========== 在庫一覧 ========== -->
      <div class="page hidden" id="page-inventory">
        <h2 class="page-title">在庫一覧</h2>
        <section class="toolbar">
          <div class="toolbar-left">
            <input type="text" id="searchInput" class="search-input" placeholder="教材名で検索...">
            <select id="subjectFilter" class="filter-select">
              <option value="すべて">科目：すべて</option>
              <option value="憲法">憲法</option>
              <option value="民法">民法</option>
              <option value="刑法">刑法</option>
              <option value="商法">商法</option>
              <option value="民事訴訟法">民事訴訟法</option>
              <option value="刑事訴訟法">刑事訴訟法</option>
              <option value="行政法">行政法</option>
              <option value="労働法">労働法</option>
              <option value="経済法">経済法</option>
              <option value="倒産法">倒産法</option>
              <option value="知的財産法">知的財産法</option>
            </select>
            <select id="stockFilter" class="filter-select">
              <option value="all">在庫状況：すべて</option>
              <option value="low">在庫少</option>
              <option value="out">在庫切れ</option>
              <option value="ok">在庫十分</option>
            </select>
          </div>
          <button class="btn btn-primary" id="addNewBtn">+ 新規教材登録</button>
        </section>
        <section class="table-section">
          <p class="result-count" id="resultCount"></p>
          <div class="table-wrap">
            <table class="inventory-table">
              <thead>
                <tr>
                  <th class="sortable" data-sort="name">教材名</th>
                  <th>科目</th>
                  <th class="sortable" data-sort="stock">在庫数</th>
                  <th>最低在庫</th>
                  <th>単価</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="inventoryBody"></tbody>
            </table>
          </div>
        </section>
      </div>

      <!-- ========== 発注アラート ========== -->
      <div class="page hidden" id="page-alerts">
        <h2 class="page-title">発注アラート</h2>
        <div class="alert-summary-row" id="alertSummaryRow"></div>
        <section class="table-section">
          <div class="section-header">
            <h3 class="section-title">在庫切れ教材</h3>
          </div>
          <div class="table-wrap">
            <table class="inventory-table">
              <thead>
                <tr>
                  <th>教材名</th>
                  <th>科目</th>
                  <th>在庫数</th>
                  <th>最低在庫</th>
                  <th>不足数</th>
                  <th>備考</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="alertOutBody"></tbody>
            </table>
          </div>
        </section>
        <section class="table-section" style="margin-top:20px;">
          <div class="section-header">
            <h3 class="section-title">在庫少教材</h3>
          </div>
          <div class="table-wrap">
            <table class="inventory-table">
              <thead>
                <tr>
                  <th>教材名</th>
                  <th>科目</th>
                  <th>在庫数</th>
                  <th>最低在庫</th>
                  <th>不足数</th>
                  <th>備考</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="alertLowBody"></tbody>
            </table>
          </div>
        </section>
      </div>

      <!-- ========== 入出庫履歴 ========== -->
      <div class="page hidden" id="page-history">
        <h2 class="page-title">入出庫履歴</h2>
        <section class="toolbar">
          <div class="toolbar-left">
            <select id="historyTypeFilter" class="filter-select">
              <option value="all">種別：すべて</option>
              <option value="in">入庫のみ</option>
              <option value="out">出庫のみ</option>
            </select>
            <select id="historySubjectFilter" class="filter-select">
              <option value="すべて">科目：すべて</option>
              <option value="憲法">憲法</option>
              <option value="民法">民法</option>
              <option value="刑法">刑法</option>
              <option value="商法">商法</option>
              <option value="民事訴訟法">民事訴訟法</option>
              <option value="刑事訴訟法">刑事訴訟法</option>
              <option value="行政法">行政法</option>
              <option value="労働法">労働法</option>
              <option value="経済法">経済法</option>
              <option value="倒産法">倒産法</option>
              <option value="知的財産法">知的財産法</option>
            </select>
          </div>
        </section>
        <section class="table-section">
          <p class="result-count" id="historyCount"></p>
          <div class="table-wrap">
            <table class="inventory-table">
              <thead>
                <tr>
                  <th>日時</th>
                  <th>種別</th>
                  <th>教材名</th>
                  <th>科目</th>
                  <th>数量</th>
                  <th>変更後在庫</th>
                  <th>担当者</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </section>
      </div>

    </main>
  </div>

  <!-- 入出庫モーダル -->
  <div class="modal-overlay" id="stockModalOverlay"></div>
  <div class="modal" id="stockModal">
    <div class="modal-header">
      <h3 id="stockModalTitle">入出庫</h3>
      <button class="modal-close" id="stockModalClose">&times;</button>
    </div>
    <div class="modal-body">
      <p class="modal-item-name" id="stockItemName"></p>
      <div class="stock-adjust">
        <label>現在の在庫: <strong id="stockCurrent">0</strong></label>
        <div class="adjust-controls">
          <button class="adjust-btn minus" id="adjustMinus">&minus;</button>
          <input type="number" id="adjustAmount" class="adjust-input" value="1" min="1">
          <button class="adjust-btn plus" id="adjustPlus">+</button>
        </div>
        <div class="adjust-actions">
          <button class="btn btn-success" id="btnStockIn">入庫</button>
          <button class="btn btn-danger" id="btnStockOut">出庫</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 新規登録 / 編集モーダル -->
  <div class="modal-overlay" id="editModalOverlay"></div>
  <div class="modal modal-wide" id="editModal">
    <div class="modal-header">
      <h3 id="editModalTitle">新規教材登録</h3>
      <button class="modal-close" id="editModalClose">&times;</button>
    </div>
    <div class="modal-body">
      <form id="editForm">
        <div class="form-row">
          <div class="form-group">
            <label for="formName">教材名 <span class="required">*</span></label>
            <input type="text" id="formName" required>
          </div>
        </div>
        <div class="form-row two-col">
          <div class="form-group">
            <label for="formSubject">科目</label>
            <select id="formSubject">
              <option value="憲法">憲法</option>
              <option value="民法">民法</option>
              <option value="刑法">刑法</option>
              <option value="商法">商法</option>
              <option value="民事訴訟法">民事訴訟法</option>
              <option value="刑事訴訟法">刑事訴訟法</option>
              <option value="行政法">行政法</option>
              <option value="労働法">労働法</option>
              <option value="経済法">経済法</option>
              <option value="倒産法">倒産法</option>
              <option value="知的財産法">知的財産法</option>
            </select>
          </div>
          <div class="form-group">
            <label for="formPrice">単価（税込）</label>
            <input type="number" id="formPrice" value="0" min="0">
          </div>
        </div>
        <div class="form-row two-col">
          <div class="form-group">
            <label for="formStock">初期在庫数</label>
            <input type="number" id="formStock" value="0" min="0">
          </div>
          <div class="form-group">
            <label for="formMinStock">最低在庫数</label>
            <input type="number" id="formMinStock" value="10" min="0">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="formNote">備考</label>
            <input type="text" id="formNote" placeholder="自由メモ">
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="editCancel">キャンセル</button>
          <button type="submit" class="btn btn-primary" id="editSubmit">登録</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 削除確認モーダル -->
  <div class="modal-overlay" id="deleteModalOverlay"></div>
  <div class="modal modal-small" id="deleteModal">
    <div class="modal-header">
      <h3>教材の削除</h3>
      <button class="modal-close" id="deleteModalClose">&times;</button>
    </div>
    <div class="modal-body">
      <p>以下の教材を削除しますか？</p>
      <p class="delete-target" id="deleteTargetName"></p>
      <p class="delete-warning">この操作は取り消せません。</p>
      <div class="form-actions">
        <button class="btn btn-secondary" id="deleteCancelBtn">キャンセル</button>
        <button class="btn btn-danger" id="deleteConfirmBtn">削除する</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
